<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Only Modal</title>
    <!-- Internal Stylesheet -->
    <style type="text/css">
      * {
        box-sizing: border-box;
      }

      body {
          margin: 0;
      }

      a.button {
          text-decoration: none;
          color: white;
          background-color: blueviolet;
          padding: 1rem 2rem;
          border-radius: 0.5rem;
          display: inline-block;
        }
        
      .info_modal {
        /* stretch a div to cover the entire screen */
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        /* transparent gray bg */
        background-color: rgba(0,0,0,0.3);
        /* make sure suer super that it is in front of all our other content */
        z-index: 99999;
        /* starting state of 0% opacity */
        opacity: 0;
        /* make sure the content behind the overlap is not clickable */
        pointer-events: none;
        transition: opacity 400 ms ease;
      }

      .info_modal:target {
        opacity: 1;
        pointer-events: auto;
      }

    </style>
  </head>
  <body>
    <!-- anchor tag targets another element on the page with a specific ID -->
    <!-- we will use CSS to make links look like buttons -->
      <a href="#info">Link to Modal 1</a>

      <!-- Begin Modal 1 -->
        <!-- Parent/Wrapper div which recieves the ID that needs to be targeted -->
          <!--This div will also be our transparent overlay -->
          <div id="info" class="info_modal center">

          
          </div>
      <!-- End Modal 1 -->
  </body>
</html>
